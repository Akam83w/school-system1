<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1d4ed8"/>
      <stop offset="100%" style="stop-color:#1e3a8a"/>
    </linearGradient>
  </defs>
  <rect width="180" height="180" rx="36" fill="url(#bg)"/>
  <!-- School building body -->
  <rect x="34" y="90" width="112" height="72" rx="4" fill="white" fill-opacity="0.95"/>
  <!-- Roof triangle -->
  <polygon points="90,28 20,90 160,90" fill="white"/>
  <!-- Door -->
  <rect x="73" y="122" width="34" height="40" rx="4" fill="#1d4ed8"/>
  <!-- Left window -->
  <rect x="42" y="100" width="22" height="18" rx="3" fill="#bfdbfe"/>
  <!-- Right window -->
  <rect x="116" y="100" width="22" height="18" rx="3" fill="#bfdbfe"/>
  <!-- Flag pole -->
  <rect x="88" y="12" width="4" height="20" fill="#f59e0b"/>
  <!-- Flag -->
  <polygon points="92,12 110,18 92,24" fill="#f59e0b"/>
</svg>
