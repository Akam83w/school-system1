<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1d4ed8"/>
      <stop offset="100%" style="stop-color:#1e3a8a"/>
    </linearGradient>
  </defs>
  <!-- Full bleed background for maskable (no rounded corners) -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- Safe zone content (centered within 80% = 409px, offset 51.5 each side) -->
  <!-- School building body -->
  <rect x="116" y="272" width="280" height="170" rx="8" fill="white" fill-opacity="0.95"/>
  <!-- Roof triangle -->
  <polygon points="256,112 76,272 436,272" fill="white"/>
  <!-- Door -->
  <rect x="218" y="354" width="80" height="88" rx="8" fill="#1d4ed8"/>
  <!-- Door knob -->
  <circle cx="290" cy="402" r="5" fill="white" fill-opacity="0.6"/>
  <!-- Left window -->
  <rect x="132" y="296" width="56" height="44" rx="5" fill="#bfdbfe"/>
  <!-- Right window -->
  <rect x="324" y="296" width="56" height="44" rx="5" fill="#bfdbfe"/>
  <!-- Flag pole -->
  <rect x="252" y="68" width="8" height="48" fill="#f59e0b"/>
  <!-- Flag -->
  <polygon points="260,68 308,80 260,92" fill="#f59e0b"/>
</svg>
