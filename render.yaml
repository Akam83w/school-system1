services:
  - type: web
    name: school-system-api
    runtime: node
    region: oregon
    plan: starter

    buildCommand: pnpm install --frozen-lockfile && pnpm run generate && pnpm --filter @workspace/db run push && pnpm run build

    startCommand: pnpm --filter @workspace/api-server run start

    envVars:
      - key: NODE_ENV
        value: production

      - key: PORT
        value: 8080

      - key: BASE_PATH
        value: /

      - key: DATABASE_URL
        scope: run
        sync: false
