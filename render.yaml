services:
  - type: web
    name: school-system-api
    runtime: node
    region: oregon
    plan: starter
    buildCommand: pnpm install && pnpm run generate && pnpm run build && pnpm --filter @workspace/db run push
    startCommand: cd artifacts/api-server && pnpm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8080
      - key: BASE_PATH
        value: /
      - key: DATABASE_URL
        scope: run
        sync: false
