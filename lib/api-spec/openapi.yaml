openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Iraqi School Management System API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: students
    description: Student management
  - name: teachers
    description: Teacher management
  - name: classes
    description: Class management
  - name: subjects
    description: Subject management
  - name: attendance
    description: Attendance tracking
  - name: grades
    description: Grade management
  - name: dashboard
    description: Dashboard analytics
  - name: users
    description: System user management (admin only)
  - name: announcements
    description: School announcements and notices
  - name: academic-years
    description: Academic year management

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Admin login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Admin"
        "401":
          description: Unauthorized

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out

  /students:
    get:
      operationId: listStudents
      tags: [students]
      summary: List all students
      parameters:
        - name: classId
          in: query
          schema:
            type: ["integer", "null"]
        - name: search
          in: query
          schema:
            type: ["string", "null"]
      responses:
        "200":
          description: List of students
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Student"
    post:
      operationId: createStudent
      tags: [students]
      summary: Create a student
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StudentInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Student"

  /students/{id}:
    get:
      operationId: getStudent
      tags: [students]
      summary: Get a student
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Student
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Student"
        "404":
          description: Not found
    patch:
      operationId: updateStudent
      tags: [students]
      summary: Update a student
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StudentUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Student"
    delete:
      operationId: deleteStudent
      tags: [students]
      summary: Delete a student
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /teachers:
    get:
      operationId: listTeachers
      tags: [teachers]
      summary: List all teachers
      parameters:
        - name: search
          in: query
          schema:
            type: ["string", "null"]
      responses:
        "200":
          description: List of teachers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Teacher"
    post:
      operationId: createTeacher
      tags: [teachers]
      summary: Create a teacher
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TeacherInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Teacher"

  /teachers/{id}:
    get:
      operationId: getTeacher
      tags: [teachers]
      summary: Get a teacher
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Teacher
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Teacher"
        "404":
          description: Not found
    patch:
      operationId: updateTeacher
      tags: [teachers]
      summary: Update a teacher
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TeacherUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Teacher"
    delete:
      operationId: deleteTeacher
      tags: [teachers]
      summary: Delete a teacher
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /classes:
    get:
      operationId: listClasses
      tags: [classes]
      summary: List all classes
      responses:
        "200":
          description: List of classes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Class"
    post:
      operationId: createClass
      tags: [classes]
      summary: Create a class
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClassInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Class"

  /classes/{id}:
    get:
      operationId: getClass
      tags: [classes]
      summary: Get a class
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Class
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Class"
        "404":
          description: Not found
    patch:
      operationId: updateClass
      tags: [classes]
      summary: Update a class
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClassUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Class"
    delete:
      operationId: deleteClass
      tags: [classes]
      summary: Delete a class
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /subjects:
    get:
      operationId: listSubjects
      tags: [subjects]
      summary: List all subjects
      responses:
        "200":
          description: List of subjects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Subject"
    post:
      operationId: createSubject
      tags: [subjects]
      summary: Create a subject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubjectInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subject"

  /subjects/{id}:
    patch:
      operationId: updateSubject
      tags: [subjects]
      summary: Update a subject
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubjectUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subject"
    delete:
      operationId: deleteSubject
      tags: [subjects]
      summary: Delete a subject
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /attendance:
    get:
      operationId: listAttendance
      tags: [attendance]
      summary: List attendance records
      parameters:
        - name: classId
          in: query
          schema:
            type: ["integer", "null"]
        - name: studentId
          in: query
          schema:
            type: ["integer", "null"]
        - name: date
          in: query
          schema:
            type: ["string", "null"]
        - name: academicYear
          in: query
          schema:
            type: ["string", "null"]
      responses:
        "200":
          description: Attendance records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Attendance"
    post:
      operationId: recordAttendance
      tags: [attendance]
      summary: Record attendance
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AttendanceInput"
      responses:
        "201":
          description: Recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Attendance"

  /attendance/{id}:
    patch:
      operationId: updateAttendance
      tags: [attendance]
      summary: Update attendance record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AttendanceUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Attendance"

  /grades:
    get:
      operationId: listGrades
      tags: [grades]
      summary: List grades
      parameters:
        - name: studentId
          in: query
          schema:
            type: ["integer", "null"]
        - name: classId
          in: query
          schema:
            type: ["integer", "null"]
        - name: subjectId
          in: query
          schema:
            type: ["integer", "null"]
        - name: academicYear
          in: query
          schema:
            type: ["string", "null"]
        - name: examType
          in: query
          schema:
            type: ["string", "null"]
      responses:
        "200":
          description: List of grades
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Grade"
    post:
      operationId: createGrade
      tags: [grades]
      summary: Create a grade
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GradeInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Grade"

  /grades/{id}:
    patch:
      operationId: updateGrade
      tags: [grades]
      summary: Update a grade
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GradeUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Grade"
    delete:
      operationId: deleteGrade
      tags: [grades]
      summary: Delete a grade
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Get dashboard statistics
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /dashboard/attendance-summary:
    get:
      operationId: getAttendanceSummary
      tags: [dashboard]
      summary: Get attendance summary by class
      responses:
        "200":
          description: Attendance summary
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AttendanceSummary"

  /dashboard/grade-distribution:
    get:
      operationId: getGradeDistribution
      tags: [dashboard]
      summary: Get grade distribution by subject
      responses:
        "200":
          description: Grade distribution
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GradeDistribution"

  /dashboard/recent-activity:
    get:
      operationId: getRecentActivity
      tags: [dashboard]
      summary: Get recent activity feed
      responses:
        "200":
          description: Recent activities
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Activity"

  /academic-years:
    get:
      operationId: listAcademicYears
      tags: [academic-years]
      summary: List all academic year entities (2020-2100)
      responses:
        "200":
          description: Array of academic year entities
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AcademicYear"

  /academic-years/current:
    get:
      operationId: getCurrentAcademicYear
      tags: [academic-years]
      summary: Get the school's active academic year
      responses:
        "200":
          description: Current academic year or null
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcademicYear"

  /academic-years/{id}/set-current:
    patch:
      operationId: setCurrentAcademicYear
      tags: [academic-years]
      summary: Set the school's active academic year (admin only)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated academic year
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcademicYear"

  /announcements:
    get:
      operationId: listAnnouncements
      tags: [announcements]
      summary: List active announcements (all authenticated users)
      responses:
        "200":
          description: List of announcements
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Announcement"
    post:
      operationId: createAnnouncement
      tags: [announcements]
      summary: Create an announcement (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnnouncementInput"
      responses:
        "201":
          description: Announcement created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Announcement"

  /announcements/{id}:
    patch:
      operationId: updateAnnouncement
      tags: [announcements]
      summary: Update an announcement (admin only)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnnouncementUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Announcement"
    delete:
      operationId: deleteAnnouncement
      tags: [announcements]
      summary: Delete an announcement (admin only)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List all system user accounts (admin only)
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SystemUser"
        "403":
          description: Forbidden
    post:
      operationId: createUser
      tags: [users]
      summary: Create a new user account (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserInput"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemUser"
        "409":
          description: Username or phone already in use

  /users/{id}:
    patch:
      operationId: updateUser
      tags: [users]
      summary: Update a user account (admin only)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        "200":
          description: User updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemUser"
        "404":
          description: User not found
    delete:
      operationId: deleteUser
      tags: [users]
      summary: Delete a user account (admin only)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "400":
          description: Cannot delete own account

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    LoginInput:
      type: object
      required: [identifier, password]
      properties:
        identifier: { type: string }
        password: { type: string }
        role: { type: string }

    AuthResponse:
      type: object
      required: [token, admin]
      properties:
        token: { type: string }
        admin:
          $ref: "#/components/schemas/Admin"

    AcademicYear:
      type: object
      required: [id, startYear, endYear, label, isCurrent]
      properties:
        id: { type: integer }
        startYear: { type: integer }
        endYear: { type: integer }
        label: { type: string }
        isCurrent: { type: boolean }

    Announcement:
      type: object
      required: [id, title, body, type, authorId, authorName, isPinned, createdAt]
      properties:
        id: { type: integer }
        title: { type: string }
        body: { type: string }
        type: { type: string }
        authorId: { type: integer }
        authorName: { type: string }
        isPinned: { type: boolean }
        expiresAt: { type: ["string", "null"] }
        createdAt: { type: string }
        updatedAt: { type: string }

    AnnouncementInput:
      type: object
      required: [title, body]
      properties:
        title: { type: string }
        body: { type: string }
        type: { type: string }
        isPinned: { type: boolean }
        expiresAt: { type: string }

    AnnouncementUpdate:
      type: object
      properties:
        title: { type: string }
        body: { type: string }
        type: { type: string }
        isPinned: { type: boolean }
        expiresAt: { type: ["string", "null"] }

    SystemUser:
      type: object
      required: [id, username, name, role]
      properties:
        id: { type: integer }
        username: { type: string }
        name: { type: string }
        role: { type: string }
        phone: { type: ["string", "null"] }
        linkedId: { type: ["integer", "null"] }
        createdAt: { type: string }

    UserInput:
      type: object
      required: [name, username, phone, password, role]
      properties:
        name: { type: string }
        username: { type: string }
        phone: { type: string }
        password: { type: string }
        role: { type: string }
        linkedId: { type: integer }

    UserUpdate:
      type: object
      properties:
        name: { type: string }
        role: { type: string }
        linkedId: { type: ["integer", "null"] }

    Admin:
      type: object
      required: [id, username, name, role]
      properties:
        id: { type: integer }
        username: { type: string }
        name: { type: string }
        role: { type: string }
        phone: { type: ["string", "null"] }
        linkedId: { type: ["integer", "null"] }

    Student:
      type: object
      required: [id, fullName, studentCode, classId, className, gender, dateOfBirth, enrollmentDate, status]
      properties:
        id: { type: integer }
        fullName: { type: string }
        studentCode: { type: string }
        nationalId: { type: ["string", "null"] }
        classId: { type: integer }
        className: { type: string }
        gender: { type: string }
        dateOfBirth: { type: string }
        enrollmentDate: { type: string }
        phone: { type: ["string", "null"] }
        parentName: { type: ["string", "null"] }
        parentPhone: { type: ["string", "null"] }
        address: { type: ["string", "null"] }
        status: { type: string }

    StudentInput:
      type: object
      required: [fullName, classId, gender, dateOfBirth]
      properties:
        fullName: { type: string }
        nationalId: { type: string }
        classId: { type: integer }
        gender: { type: string }
        dateOfBirth: { type: string }
        phone: { type: string }
        parentName: { type: string }
        parentPhone: { type: string }
        address: { type: string }
        status: { type: string }

    StudentUpdate:
      type: object
      properties:
        fullName: { type: string }
        nationalId: { type: string }
        classId: { type: integer }
        gender: { type: string }
        dateOfBirth: { type: string }
        phone: { type: string }
        parentName: { type: string }
        parentPhone: { type: string }
        address: { type: string }
        status: { type: string }

    Teacher:
      type: object
      required: [id, fullName, teacherCode, specialization, phone, status]
      properties:
        id: { type: integer }
        fullName: { type: string }
        teacherCode: { type: string }
        specialization: { type: string }
        phone: { type: string }
        email: { type: ["string", "null"] }
        address: { type: ["string", "null"] }
        hireDate: { type: string }
        status: { type: string }

    TeacherInput:
      type: object
      required: [fullName, specialization, phone]
      properties:
        fullName: { type: string }
        specialization: { type: string }
        phone: { type: string }
        email: { type: string }
        address: { type: string }
        hireDate: { type: string }
        status: { type: string }

    TeacherUpdate:
      type: object
      properties:
        fullName: { type: string }
        specialization: { type: string }
        phone: { type: string }
        email: { type: string }
        address: { type: string }
        hireDate: { type: string }
        status: { type: string }

    Class:
      type: object
      required: [id, name, grade, teacherId, teacherName, capacity, studentCount, academicYear]
      properties:
        id: { type: integer }
        name: { type: string }
        grade: { type: string }
        teacherId: { type: integer }
        teacherName: { type: string }
        capacity: { type: integer }
        studentCount: { type: integer }
        academicYear: { type: string }
        room: { type: ["string", "null"] }

    ClassInput:
      type: object
      required: [name, grade, teacherId, capacity, academicYear]
      properties:
        name: { type: string }
        grade: { type: string }
        teacherId: { type: integer }
        capacity: { type: integer }
        academicYear: { type: string }
        room: { type: string }

    ClassUpdate:
      type: object
      properties:
        name: { type: string }
        grade: { type: string }
        teacherId: { type: integer }
        capacity: { type: integer }
        academicYear: { type: string }
        room: { type: string }

    Subject:
      type: object
